<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:p="http://primefaces.org/ui">
<h:head>
    <title>Livraria - Dashboard</title>
    <h:outputStylesheet library="css" name="dashboard.css" />
</h:head>
<h:body>

    <div class="lv-shell">

        <ui:include src="/dashboard/sidebar.xhtml" />

        <main class="lv-main">

            <header class="lv-header">
                <h1 class="lv-greeting">
                    Seja bem vindo de volta, <span>#{sessionScope.clienteLogado.nome}</span>
                </h1>

                <h:form id="formTopo">
                    <div class="lv-user-widget">
                        <div class="lv-avatar">#{sessionScope.clienteLogado.nome.substring(0,1)}</div>
                        <span class="lv-user-name">#{sessionScope.clienteLogado.nome}</span>
                        <p:commandLink action="#{loginController.logout}" styleClass="lv-logout" title="Sair">
                            <span class="pi pi-sign-out"></span>
                        </p:commandLink>
                    </div>
                </h:form>
            </header>

            <ui:insert name="content">Conteúdo</ui:insert>

        </main>

    </div>

</h:body>
</html>
