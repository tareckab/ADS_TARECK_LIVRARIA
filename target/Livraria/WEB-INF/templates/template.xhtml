<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:p="http://primefaces.org/ui">
<h:head>
    <title>Livraria - Dashboard</title>
</h:head>
<h:body>
    <h:form id="formTopo">
        <p:toolbar>
            <p:toolbarGroup>
                <h:outputText value="Livraria" style="font-weight:bold;font-size:1.2em" />
            </p:toolbarGroup>
            <p:toolbarGroup align="right">
<h:outputText value="Olá, #{sessionScope.clienteLogado.nome}" style="margin-right:10px" />   
<p:commandButton value="Sair" action="#{loginController.logout}" />
            </p:toolbarGroup>
        </p:toolbar>
    </h:form>

    <div style="display:flex;">
        <div style="width:220px;">
            <ui:include src="/dashboard/sidebar.xhtml" />
        </div>
        <div style="flex:1;padding:20px;">
            <ui:insert name="content">Conteúdo padrão</ui:insert>
        </div>
    </div>
</h:body>
</html>
