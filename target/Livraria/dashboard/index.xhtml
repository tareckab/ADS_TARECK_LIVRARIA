<ui:composition template="/WEB-INF/templates/template.xhtml"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:p="http://primefaces.org/ui">

    <ui:define name="content">

        <h2>Bem-vindo, #{sessionScope.clienteLogado.nome}!</h2>
        <p>Aqui está um resumo do sistema.</p>

        <div style="display:flex; gap:20px; margin-top:20px;">

            <p:panel header="Clientes" style="flex:1; text-align:center;">
                <h:outputText value="#{dashboardBean.totalClientes}"
                              style="font-size:2em; font-weight:bold;" />
                <br/>
                <h:link value="Ver clientes" outcome="/dashboard/clientes.xhtml" />
            </p:panel>

            <p:panel header="Livros" style="flex:1; text-align:center;">
                <h:outputText value="#{dashboardBean.totalLivros}"
                              style="font-size:2em; font-weight:bold;" />
                <br/>
                <h:link value="Ver livros" outcome="/dashboard/livros.xhtml" />
            </p:panel>

            <p:panel header="Livrarias" style="flex:1; text-align:center;">
                <h:outputText value="#{dashboardBean.totalLivrarias}"
                              style="font-size:2em; font-weight:bold;" />
                <br/>
                <h:link value="Ver livrarias" outcome="/dashboard/livrarias.xhtml" />
            </p:panel>

        </div>

    </ui:define>

</ui:composition>
