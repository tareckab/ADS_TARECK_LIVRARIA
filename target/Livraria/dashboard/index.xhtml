<ui:composition template="/WEB-INF/templates/template.xhtml"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

    <ui:define name="content">
        <div class="lv-grid">

            <div class="lv-card lv-card--stat">
                <span class="lv-card-label">Total de reservas</span>
                <span class="lv-card-value">#{dashboardBean.totalReservas}</span>
            </div>

            <div class="lv-card lv-card--list">
                <span class="lv-card-label">Livros reservados</span>
                <ul class="lv-list">
                    <ui:repeat value="#{dashboardBean.livrosReservados}" var="item">
                        <li>#{item}</li>
                    </ui:repeat>
                </ul>
            </div>

            <div class="lv-card lv-card--list">
                <span class="lv-card-label">Próximas datas de devolução</span>
                <ul class="lv-list">
                    <ui:repeat value="#{dashboardBean.proximasDevolucoes}" var="item">
                        <li>#{item}</li>
                    </ui:repeat>
                </ul>
            </div>

        </div>
    </ui:define>

</ui:composition>
