<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">

<h:head>
    <title>Login - Livraria</title>
</h:head>

<h:body>

    <h:form id="formLogin">

        <p:growl id="growl" showDetail="true" life="3000" />

        <p:panel header="Login do Sistema"
                 style="width: 350px; margin: 150px auto; text-align: center;">

            <h3>Bem-vindo</h3>

            <p:outputLabel for="cpf" value="CPF" />
            <p:inputText id="cpf"
                         value="#{loginController.cliente.cpf}"
                         required="true"
                         requiredMessage="Informe o CPF"
                         style="width: 100%" />

            <br/><br/>

            <p:outputLabel for="senha" value="Senha" />
            <p:password id="senha"
                        value="#{loginController.cliente.senha}"
                        required="true"
                        requiredMessage="Informe a senha"
                        feedback="false"
                        style="width: 100%" />

            <br/><br/>

            <p:commandButton value="Entrar"
                             action="#{loginController.validarLogin}"
                             update="growl"
                             style="width: 100%" />
            
            <br/><br/>

               <h:link value="Criar Conta" outcome="cadastro.xhtml" />

        </p:panel>

    </h:form>

</h:body>
</html>
